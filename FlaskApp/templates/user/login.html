{% extends 'base.html' %}
{% block title %}Daxil ol{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm" style="border-radius: 16px;">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3"
                                 style="width: 64px; height: 64px; background: linear-gradient(135deg, #1a365d, #0ea5e9);">
                                <i class="bi bi-person-fill text-white fs-3"></i>
                            </div>
                            <h3 class="fw-bold mb-1">Hesaba Daxil Ol</h3>
                            <p class="text-muted">Ömürboyu Təhsil Məktəbi</p>
                        </div>

                        <form method="POST" action="{{ url_for('user.login') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-3">
                                <label class="form-label fw-medium">İstifadəçi adı və ya E-poçt</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" name="username" class="form-control" placeholder="İstifadəçi adınız" required autofocus>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-medium">Şifrə</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" name="password" class="form-control" placeholder="Şifrəniz" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="remember" id="remember">
                                    <label class="form-check-label small" for="remember">Məni xatırla</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-medium" 
                                    style="background: linear-gradient(135deg, #1a365d, #0ea5e9); border: none; border-radius: 10px;">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Daxil ol
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted mb-0">
                                Hesabınız yoxdur? 
                                <a href="{{ url_for('user.register') }}" class="fw-medium text-decoration-none" style="color: #0ea5e9;">Qeydiyyatdan keçin</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
