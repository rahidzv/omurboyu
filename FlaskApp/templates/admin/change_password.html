{% extends 'admin/base_admin.html' %}
{% block title %}Şifrə Dəyiş{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-key me-2"></i>Admin Şifrə Dəyişdirmə
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-2"
                         style="width: 64px; height: 64px; background: #1a365d; color: #fff; font-size: 1.3rem; font-weight: 700;">
                        {{ current_user.get_initials() }}
                    </div>
                    <h6 class="fw-bold">{{ current_user.full_name or current_user.username }}</h6>
                    <small class="text-muted">@{{ current_user.username }}</small>
                </div>

                <form method="POST" action="{{ url_for('admin.change_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label class="form-label fw-medium">Cari Şifrə</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="current_password" class="form-control" required placeholder="Mövcud şifrəniz">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-medium">Yeni Şifrə</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="new_password" class="form-control" required minlength="6" placeholder="ən az 6 simvol">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-medium">Yeni Şifrə (təkrar)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="new_password2" class="form-control" required minlength="6" placeholder="Yeni şifrəni təkrarlayın">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-1"></i> Şifrəni Dəyiş
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
