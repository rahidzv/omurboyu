<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Giriş - ÖTM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1a365d 0%,#0ea5e9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-card{background:#fff;border-radius:1rem;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .login-logo{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#1a365d,#0ea5e9);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
        .btn-primary{background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;padding:0.75rem}
        .btn-primary:hover{background:linear-gradient(135deg,#0284c7,#0369a1)}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-logo mb-2">ÖTM</div>
            <h5 class="fw-bold">Admin Panel</h5>
            <p class="text-muted small">İdarəetmə panelinə daxil olun</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label fw-medium">İstifadəçi adı</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-medium">Şifrə</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Daxil Ol</button>
        </form>
        <div class="text-center mt-4">
            <a href="{{ url_for('public.index') }}" class="text-muted small"><i class="bi bi-arrow-left"></i> Sayta qayıt</a>
        </div>
    </div>
</body>
</html>
