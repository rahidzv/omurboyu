{% extends 'admin/base_admin.html' %}
{% block title %}{{ 'Redaktə: ' ~ testimonial.name if testimonial else 'Yeni Rəy' }}{% endblock %}

{% block admin_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">{{ 'Redaktə: ' ~ testimonial.name if testimonial else 'Yeni Rəy' }}</h2>
    <a href="{{ url_for('admin.testimonials_list') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Geri
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">Ad</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ testimonial.name if testimonial else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="role" class="form-label">Rol</label>
                    <input type="text" class="form-control" id="role" name="role" value="{{ testimonial.role if testimonial else '' }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="content" class="form-label">Məzmun</label>
                <textarea class="form-control" id="content" name="content" rows="5" required>{{ testimonial.content if testimonial else '' }}</textarea>
            </div>

            <div class="mb-3">
                <label for="avatar_initials" class="form-label">Avatar İnisialları</label>
                <input type="text" class="form-control" id="avatar_initials" name="avatar_initials" value="{{ testimonial.avatar_initials if testimonial else '' }}" maxlength="3" placeholder="məs: AH">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active" value="1"
                    {{ 'checked' if (testimonial and testimonial.is_active) or not testimonial else '' }}>
                <label class="form-check-label" for="is_active">Aktiv</label>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> {{ 'Yenilə' if testimonial else 'Yarat' }}
                </button>
                <a href="{{ url_for('admin.testimonials_list') }}" class="btn btn-outline-secondary">Ləğv et</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
